<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SignUp Page</title>
    <link rel="stylesheet" href="Styles.css" />
  </head>

  <body>
    <nav class="navbar">
      <a href="Home.html">Home</a>
      <a href="SignIn.html">Sign in</a>
      <a href="SignUp.html">Sign up</a>
    </nav>

    <h2 class="main-title">Sign up</h2>
    <div class="form-container">
      <form>
        <!-- Name -->
        <label for="Name"><b>Name:</b></label
        ><br />
        <input
          type="text"
          id="Name"
          name="Name"
          class="input-field"
        /><br /><br />

        <!-- Email -->
        <label for="Email"><b>Email:</b></label
        ><br />
        <input
          type="text"
          id="Email"
          name="Email"
          class="input-field"
        /><br /><br />

        <!-- Password -->
        <label for="Password"><b>Password:</b></label
        ><br />
        <input
          type="password"
          id="Password"
          name="Password"
          class="input-field"
        /><br /><br />

        <!-- ReEnterPassword -->
        <label for="ReEnterPassword"><b>ReEnterPassword:</b></label
        ><br />
        <input
          type="password"
          id="ReEnterPassword"
          name="ReEnterPassword"
          class="input-field"
        /><br /><br />

        <div class="radio-group">
          <!-- Gender -->
          <label for="Gender"><b>Gender:</b></label
          ><br /><br />
          <input type="radio" id="Gendder" name="Gender" value="Male" />
          <label for="Male"><b>Male</b></label>

          <input type="radio" id="Gendder" name="Gender" value="Female" />
          <label for="Female"><b>Female</b></label
          ><br /><br />
        </div>
        <!-- Country -->
        <label for="Country"><b>Country</b></label
        ><br />
        <select for="Country" name="Country">
          <option value="EG">Egypt</option>
          <option value="SA">Saudia Arabia</option>
          <option value="SY">Syria</option></select
        ><br /><br />
        <button type="submit" class="btn"><b>Sign up</b></button>
      </form>
    </div>
  </body>
</html>
